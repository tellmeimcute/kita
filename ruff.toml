target-version = "py313"

line-length = 99
indent-width = 4
 
src = ["src"]
 
[lint]
preview = true

select = [
    # "C", # TODO: mccabe - code complecity
    "A", # flake8-annotations
    "B", # flake8-bugbear
    "C4", # flake8-comprehensions
    "DTZ", # flake8-datetimez
    "E", # pycodestyle errors
    "F", # pyflakes
    "I", # isort
    "PERF", # perflint
    "PL", # pylint
    "Q", # flake8-quotes
    "RET", # flake8-return
    "SIM", # flake8-simplify
    "T10", # flake8-debugger
    "T20", # flake8-print
    "UP", # pyupgrade
]

ignore = [
    "C408",  # Ненужный вызов dict, list и т.д.
    "RUF001", # Игнорирование похожих символов с разными ASCII
    "RUF002", # Игнорирование похожих символов с разными ASCII
    "RUF003", # Игнорирование похожих символов с разными ASCII
    "S110",  # try-except-pass
    "PLR0917", # too-many-positional-arguments (Telegram API design)
]

fixable = [
    "I", # cортировка испортов
]
 
[format]
quote-style = "double"
indent-style = "space"
 
[lint.flake8-bandit]
check-typed-exception = true